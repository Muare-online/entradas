<html lang="gl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Muaré — A Resurrección do Baile</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link rel="preload" href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow+Condensed:wght@400;600&display=swap" as="style" onload="this.onload=null;this.rel='stylesheet'" />
  <noscript><link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow+Condensed:wght@400;600&display=swap" rel="stylesheet" /></noscript>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --cream: #C5C5C5;
      --ink: #121212;
      --red: #e23121;
      --white: #e8e4de;
    }

    body {
      background: var(--cream);
      font-family: 'Barlow Condensed', sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem 1.5rem;
    }

    .poster-frame {
      width: 100%;
      max-width: 680px;
      border: 4px solid var(--ink);
      overflow: hidden;
      background: var(--cream);
    }

    /* Header */
    .header {
      background: var(--ink);
      text-align: center;
      padding: 1rem 2rem 0;
    }

    .pre-title {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 0.8rem;
      font-weight: 600;
      letter-spacing: 0.5em;
      text-transform: uppercase;
      color: rgba(232,228,222,0.45);
      margin-bottom: 0.3rem;
    }

    .logo-wrap {
      padding: 0.8rem 1.5rem 0.8rem;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 80px;
    }

    .logo-img {
      max-width: 62%;
      width: 300px;
      height: auto;
      display: block;
      margin-bottom: -8px;
    }

    .subtitle-bar {
      background: var(--red);
      color: var(--white);
      font-family: 'Bebas Neue', sans-serif;
      font-size: clamp(1rem, 4vw, 1.85rem);
      letter-spacing: 0.18em;
      text-align: center;
      padding: 0.55rem 2rem;
      display: block;
      text-transform: uppercase;
    }

    .poster-meta {
      background: var(--ink);
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 0.7rem 2.5rem;
      border-bottom: 3px solid var(--red);
    }

    .poster-meta-item {
      font-family: 'Barlow Condensed', sans-serif;
      font-weight: 600;
      font-size: clamp(0.8rem, 2.2vw, 1.05rem);
      letter-spacing: 0.22em;
      text-transform: uppercase;
      color: var(--white);
      text-align: center;
      line-height: 1.35;
    }

    .poster-meta-item span {
      display: block;
      font-size: 0.6em;
      letter-spacing: 0.4em;
      color: rgba(232,228,222,0.45);
      font-weight: 400;
    }

    /* Band photo */
    .band-photo img {
      width: 100%;
      display: block;
      filter: grayscale(100%) contrast(1.1);
    }

    /* Message area */
    .message-area {
      padding: 3rem 2.5rem;
      text-align: center;
    }

    .message-text {
      font-family: 'Bebas Neue', sans-serif;
      font-size: clamp(1.6rem, 5vw, 2.6rem);
      letter-spacing: 0.08em;
      color: var(--ink);
      line-height: 1.25;
    }

    .message-text em {
      color: var(--red);
      font-style: normal;
    }

    footer {
      background: var(--ink);
      color: var(--white);
      text-align: center;
      padding: 1.1rem 2rem;
    }

    footer p {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 1.5rem;
      letter-spacing: 0.3em;
      color: var(--white);
    }

    @media (max-width: 480px) {
      .poster-meta { flex-direction: column; gap: 0.4rem; padding: 0.8rem 1rem; }
      .message-area { padding: 2rem 1.5rem; }
    }
  </style>
</head>
